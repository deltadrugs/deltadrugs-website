<svg class="pro-workflow-svg" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" aria-label="Referral workflow from intake to delivery">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F58326"/></marker>
  </defs>
  <!-- connecting path -->
  <path d="M120 320 Q300 280 480 320 T840 320 T1080 320" fill="none" stroke="#F58326" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Stage 1: Intake -->
  <g class="workflow-stage workflow-stage-1" transform="translate(40, 40)">
    <rect x="0" y="180" width="200" height="8" rx="4" fill="#E8E8E8"/>
    <rect x="20" y="120" width="80" height="60" rx="4" fill="#fff" stroke="#757561" stroke-width="1.5"/>
    <rect x="28" y="128" width="64" height="40" rx="2" fill="#F5F5F5"/>
    <line x1="32" y1="136" x2="88" y2="136" stroke="#757561" stroke-width="1"/>
    <line x1="32" y1="148" x2="72" y2="148" stroke="#757561" stroke-width="1"/>
    <!-- person -->
    <circle cx="130" cy="100" r="18" fill="#D4A574"/>
    <path d="M110 145 Q130 125 150 145 L150 188 L110 188 Z" fill="#757561"/>
    <ellipse cx="130" cy="95" rx="20" ry="8" fill="#3D3D2E" opacity="0.3"/>
    <rect x="115" y="88" width="30" height="6" rx="3" fill="#333"/>
    <!-- badge -->
    <rect x="40" y="20" width="120" height="24" rx="12" fill="#F58326"/>
    <text x="100" y="37" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="700">Referral Received</text>
  </g>

  <!-- Stage 2: Insurance -->
  <g class="workflow-stage workflow-stage-2" transform="translate(260, 40)">
    <circle cx="100" cy="100" r="18" fill="#D4A574"/>
    <path d="M80 145 Q100 125 120 145 L120 188 L80 188 Z" fill="#757561"/>
    <rect x="95" y="75" width="10" height="18" rx="3" fill="#333" transform="rotate(-15 100 84)"/>
    <rect x="130" y="130" width="50" height="65" rx="3" fill="#fff" stroke="#757561"/>
    <line x1="138" y1="145" x2="172" y2="145" stroke="#757561" stroke-width="1"/>
    <line x1="138" y1="158" x2="168" y2="158" stroke="#757561" stroke-width="1"/>
    <path d="M155 115 L165 125 L145 125 Z" fill="#F58326"/>
    <rect x="55" y="20" width="130" height="24" rx="12" fill="#F58326"/>
    <text x="120" y="37" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="700">Insurance Verified</text>
  </g>

  <!-- Stage 3: Pharmacist -->
  <g class="workflow-stage workflow-stage-3" transform="translate(480, 40)">
    <circle cx="100" cy="95" r="18" fill="#D4A574"/>
    <path d="M78 140 Q100 118 122 140 L125 188 L75 188 Z" fill="#fff" stroke="#757561" stroke-width="1.5"/>
    <rect x="70" y="155" width="60" height="33" fill="#fff" stroke="#757561"/>
    <rect x="130" y="150" width="70" height="50" rx="3" fill="#F5F5F5" stroke="#757561"/>
    <line x1="138" y1="165" x2="192" y2="165" stroke="#757561"/>
    <line x1="138" y1="178" x2="180" y2="178" stroke="#757561"/>
    <rect x="55" y="20" width="110" height="24" rx="12" fill="#F58326"/>
    <text x="110" y="37" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="700">Order Reviewed</text>
  </g>

  <!-- Stage 4: Packing -->
  <g class="workflow-stage workflow-stage-4" transform="translate(700, 40)">
    <circle cx="90" cy="105" r="16" fill="#D4A574"/>
    <path d="M72 145 Q90 128 108 145 L108 185 L72 185 Z" fill="#757561"/>
    <rect x="120" y="155" width="70" height="45" rx="4" fill="#D4C4A8" stroke="#757561"/>
    <rect x="125" y="160" width="60" height="8" fill="#F58326"/>
    <text x="155" y="168" text-anchor="middle" fill="#fff" font-size="6" font-family="sans-serif">DELTA DRUGS</text>
    <rect x="130" y="175" width="50" height="20" fill="#fff" stroke="#757561" stroke-width="0.5"/>
    <rect x="50" y="20" width="100" height="24" rx="12" fill="#F58326"/>
    <text x="100" y="37" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11" font-weight="700">Order Packed</text>
  </g>

  <!-- Stage 5: Delivery -->
  <g class="workflow-stage workflow-stage-5" transform="translate(920, 40)">
    <rect x="30" y="170" width="80" height="50" fill="#E8DDD0" stroke="#757561"/>
    <polygon points="30,170 70,140 110,170" fill="#C4B5A0" stroke="#757561"/>
    <rect x="50" y="195" width="20" height="25" fill="#757561"/>
    <!-- driver -->
    <circle cx="130" cy="110" r="16" fill="#D4A574"/>
    <path d="M114 148 Q130 132 146 148 L146 185 L114 185 Z" fill="#F58326"/>
    <rect x="148" y="155" width="35" height="28" rx="3" fill="#757561"/>
    <text x="165" y="173" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">DD</text>
    <!-- elderly recipient -->
    <circle cx="60" cy="130" r="14" fill="#D4A574"/>
    <path d="M46 158 Q60 145 74 158 L74 188 L46 188 Z" fill="#757561"/>
    <rect x="20" y="20" width="140" height="24" rx="12" fill="#F58326"/>
    <text x="90" y="37" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="10" font-weight="700">Delivered to Your Door</text>
  </g>
</svg>
