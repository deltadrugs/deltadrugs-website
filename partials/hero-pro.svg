<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" aria-label="Referral workflow">
  <rect width="600" height="320" fill="#F8F8F6" rx="12"/>
  <!-- Dotted path -->
  <path d="M80 260 Q200 240 300 260 T520 260" fill="none" stroke="#F58326" stroke-width="2" stroke-dasharray="6 5" opacity="0.7"/>
  <!-- Stage 1: Intake -->
  <g transform="translate(30, 40)">
    <rect x="0" y="140" width="110" height="60" rx="6" fill="#FFF" stroke="#E8E8E4"/>
    <rect x="10" y="155" width="50" height="35" rx="3" fill="#F8F8F6" stroke="#757561" stroke-width="1"/>
    <circle cx="85" cy="130" r="16" fill="#D4A574"/>
    <path d="M68 155 Q85 140 102 155 L102 200 L68 200 Z" fill="#757561"/>
    <rect x="72" y="118" width="26" height="5" rx="2" fill="#333"/>
    <text x="55" y="25" text-anchor="middle" fill="#757561" font-size="9" font-weight="700" font-family="sans-serif">Intake</text>
  </g>
  <!-- Stage 2: Pharmacist -->
  <g transform="translate(160, 40)">
    <circle cx="55" cy="125" r="16" fill="#D4A574"/>
    <path d="M38 150 Q55 132 72 150 L75 200 L35 200 Z" fill="#FFF" stroke="#757561"/>
    <rect x="70" y="155" width="45" height="35" rx="3" fill="#F8F8F6" stroke="#757561"/>
    <line x1="76" y1="165" x2="108" y2="165" stroke="#757561" stroke-width="1"/>
    <line x1="76" y1="175" x2="100" y2="175" stroke="#757561" stroke-width="1"/>
    <text x="55" y="25" text-anchor="middle" fill="#757561" font-size="9" font-weight="700" font-family="sans-serif">Review</text>
  </g>
  <!-- Stage 3: Packing -->
  <g transform="translate(300, 40)">
    <circle cx="55" cy="130" r="14" fill="#D4A574"/>
    <path d="M40 155 Q55 142 70 155 L70 195 L40 195 Z" fill="#757561"/>
    <rect x="75" y="165" width="45" height="35" rx="4" fill="#FFF" stroke="#757561"/>
    <rect x="80" y="170" width="35" height="7" fill="#F58326" rx="2"/>
    <text x="97" y="176" text-anchor="middle" fill="#fff" font-size="5" font-family="sans-serif">DD</text>
    <text x="55" y="25" text-anchor="middle" fill="#757561" font-size="9" font-weight="700" font-family="sans-serif">Pack</text>
  </g>
  <!-- Stage 4: Delivery van -->
  <g transform="translate(430, 50)">
    <rect x="0" y="150" width="70" height="35" rx="6" fill="#F58326"/>
    <rect x="55" y="135" width="35" height="50" rx="4" fill="#FFF" stroke="#757561"/>
    <circle cx="20" cy="190" r="10" fill="#757561"/>
    <circle cx="65" cy="190" r="10" fill="#757561"/>
    <path d="M10 260 Q60 230 110 260" fill="none" stroke="#F58326" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="95" y="220" width="40" height="30" fill="#E8E8E4" stroke="#757561"/>
    <polygon points="95,220 115,205 135,220" fill="#D8D8D4" stroke="#757561"/>
    <text x="55" y="20" text-anchor="middle" fill="#757561" font-size="9" font-weight="700" font-family="sans-serif">Deliver</text>
  </g>
</svg>
